<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mary Kay Product Search</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="/">Mary Kay <span>Search</span></a>

      <div class="search-wrapper">
        <input type="text" id="search-input" class="search-input"
               placeholder="Search products, skincare, makeup, fragrance..."
               autocomplete="off">
        <button id="search-btn" class="search-btn">&#x1F50D;</button>
      </div>

      <div class="locale-toggle">
        <button class="locale-btn" data-locale="en_US">EN</button>
        <button class="locale-btn" data-locale="es_US">ES</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <div class="main">

    <!-- Sidebar Filters -->
    <aside class="sidebar">
      <div class="filter-section">
        <div class="filter-title">Category</div>
        <div id="categories-list"></div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Page Type</div>
        <div id="types-list"></div>
      </div>
    </aside>

    <!-- Results -->
    <div class="results-area">
      <div class="results-header">
        <div id="results-count" class="results-count"></div>
      </div>

      <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div>
        Searching...
      </div>

      <div id="results-grid" class="results-grid"></div>
      <div id="pagination" class="pagination"></div>
    </div>
  </div>

  <!-- Detail Overlay -->
  <div id="detail-overlay" class="detail-overlay">
    <div id="detail-content"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
